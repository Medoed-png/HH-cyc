# Пример nginx перед приложением (TLS терминируется здесь).
# Ключевое: для /api/events (SSE) ОТКЛЮЧАЕМ буферизацию, иначе события копятся
# в буфере и не доходят до браузера в реальном времени.
upstream hh_app {
    server app:8000;
}

server {
    listen 80;
    server_name _;

    # SSE-поток событий — без буферизации, долго живущее соединение.
    location /api/events {
        proxy_pass http://hh_app;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://hh_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
