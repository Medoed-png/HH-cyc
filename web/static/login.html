<!DOCTYPE html>
<html lang="ru" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HH-бот — вход</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="d-flex align-items-center justify-content-center min-vh-100 p-3">
    <div class="card shadow" style="width:100%;max-width:380px">
      <div class="card-body p-4">
        <div class="h4 text-center mb-4"><i class="bi bi-robot text-primary"></i> HH-бот</div>
        <div class="btn-group w-100 mb-4" role="group">
          <button id="tab-login" type="button" class="btn btn-primary active">Вход</button>
          <button id="tab-register" type="button" class="btn btn-outline-primary">Регистрация</button>
        </div>

        <form id="auth-form" autocomplete="on">
          <label class="form-label small text-secondary">Email</label>
          <input id="email" class="form-control mb-3" type="email" required autocomplete="username" placeholder="you@example.com">

          <label class="form-label small text-secondary">Пароль</label>
          <input id="password" class="form-control mb-3" type="password" required autocomplete="current-password"
                 placeholder="минимум 6 символов" minlength="6">

          <div id="auth-error" class="alert alert-danger py-2 small" style="display:none"></div>

          <button id="auth-submit" class="btn btn-primary w-100" type="submit">Войти</button>
        </form>

        <div class="text-center text-secondary small mt-3" id="auth-hint">Нет аккаунта? Нажмите «Регистрация».</div>
      </div>
    </div>
  </div>

  <script src="/static/auth.js"></script>
  <script>
    "use strict";
    // Если уже авторизован — сразу в приложение.
    if (getToken()) location.href = "/";

    let mode = "login"; // login | register
    const $ = (id) => document.getElementById(id);
    const errBox = $("auth-error");

    function setMode(m) {
      mode = m;
      // Активная вкладка: заливаем, неактивную — контурной.
      $("tab-login").className = "btn " + (m === "login" ? "btn-primary active" : "btn-outline-primary");
      $("tab-register").className = "btn " + (m === "register" ? "btn-primary active" : "btn-outline-primary");
      $("auth-submit").textContent = m === "login" ? "Войти" : "Создать аккаунт";
      $("password").autocomplete = m === "login" ? "current-password" : "new-password";
      $("auth-hint").textContent = m === "login"
        ? "Нет аккаунта? Нажмите «Регистрация»."
        : "Уже есть аккаунт? Нажмите «Вход».";
      errBox.style.display = "none";
    }

    $("tab-login").onclick = () => setMode("login");
    $("tab-register").onclick = () => setMode("register");

    $("auth-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      errBox.style.display = "none";
      const email = $("email").value.trim();
      const password = $("password").value;
      const path = mode === "login" ? "/auth/login" : "/auth/register";
      try {
        const r = await fetch(path, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password }),
        });
        const data = await r.json();
        if (!r.ok) {
          errBox.textContent = data.error || "Не удалось войти. Проверьте данные.";
          errBox.style.display = "block";
          return;
        }
        setToken(data.token);
        location.href = "/";
      } catch (err) {
        errBox.textContent = "Сервер недоступен. Повторите позже.";
        errBox.style.display = "block";
      }
    });
  </script>
</body>
</html>
